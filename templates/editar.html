{% extends "layout.html" %}

{% block conteudo %}

<h2 style="text-align:center; margin-top:40px;">Editar Imóvel</h2>

<form method="POST"
style="max-width:400px; margin:30px auto; display:flex; flex-direction:column; gap:10px;">

    <input type="text" name="titulo" value="{{ imovel['titulo'] }}" required>

    <textarea name="descricao" required>{{ imovel['descricao'] }}</textarea>

    <input type="text" name="preco" value="{{ imovel['preco'] }}" required>

    <input type="text" name="bairro" value="{{ imovel['bairro'] }}" required>

    <input type="number" name="dormitorios" value="{{ imovel['dormitorios'] }}" required>

    <input type="number" name="vagas" value="{{ imovel['vagas'] }}" required>

    <button type="submit" class="botao">Salvar Alterações</button>

</form>

{% endblock %}
